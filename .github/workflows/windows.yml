name: Windows Release

on:
  push:
    branches:
      - ci/windows-*
    tags:
      - '*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows-binary:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v3
      with:
        node-version: 22
        cache: npm
    - uses: actions/setup-go@v4
      with:
        go-version: '1.24.2'
    - run: |
        $VERSION = Get-Content VERSION -Raw
        $VERSION = $VERSION.Trim()
        $LDFLAGS = "-X github.com/ananthakumaran/paisa/internal/version.current=$VERSION"
        choco install sqlite
        choco install wget
        choco install nsis
        npm install
        npm run build
        wget https://github.com/FullofQuarks/Windows-Ledger-Binaries/releases/download/v3.3.2/ledger.exe
        cp ledger.exe internal/binary/ledger
        go build -ldflags $LDFLAGS
        cp paisa.exe paisa-cli-windows-amd64.exe
        $env:PATH += ";C:\Program Files (x86)\NSIS\Bin"
        cd desktop
        go install github.com/wailsapp/wails/v2/cmd/wails@latest
        wails build -tags webkit2_40 -nsis -webview2 embed -ldflags $LDFLAGS
        cd ..
        cp .\desktop\build\bin\paisa-amd64-installer.exe paisa-app-windows-amd64.exe
    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        draft: true
        files: |
          paisa-*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
