name: Test

on:
  - push
  - pull_request

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PRETTIER_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: nixbuild/nix-quick-install-action@v31
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}
      - run: |
          nix develop --command npm ci
          nix develop --command npm run check:format:changed
          nix develop --command npm run check
          nix develop --command bash ./scripts/gofmt-changed.sh
          nix develop --command make test
