name: Test

on:
  - push
  - pull_request

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PRETTIER_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24.2"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"
      - uses: nixbuild/nix-quick-install-action@v31
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}
      - run: |
          npm ci
          npm run check:format:changed
          npm run check
          node ./scripts/gofmt-changed.mjs
          npm run test:imports
          npm run build
          nix develop --command bash -lc 'go build && unset PAISA_CONFIG && TZ=UTC bun test tests/regression.test.ts'
          nix develop --command go test ./...
