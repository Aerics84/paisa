name: Linux App Release

on:
  push:
    branches:
      - ci/linux-app-*
    tags:
      - '*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  linux-app-binary:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v6
    - uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-24.11
    - uses: actions/setup-node@v3
      with:
        node-version: 22
        cache: npm
    - uses: actions/setup-go@v4
      with:
        go-version: '1.24.2'
    - uses: vegardit/fast-apt-mirror.sh@v1
    - run: |
        sudo apt-get install -y sqlite3 libgtk-3-dev libwebkit2gtk-4.0-dev build-essential pkg-config
        npm install
        npm run sync-version
        npm run build
        nix-build ledger.nix
        cp ./result/bin/ledger internal/binary/ledger
        VERSION=$(cat VERSION)
        LDFLAGS="-X github.com/ananthakumaran/paisa/internal/version.current=${VERSION}"
        cd desktop
        go install github.com/wailsapp/wails/v2/cmd/wails@latest
        wails doctor
        wails build -tags webkit2_40 -ldflags "${LDFLAGS}"
        cp build/bin/Paisa build/linux/usr/local/bin
        cp -r build/linux "paisa_${VERSION}_amd64"
        dpkg --build "paisa_${VERSION}_amd64"
        cd ..
        mv "desktop/paisa_${VERSION}_amd64.deb" paisa-app-linux-amd64.deb
    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        draft: true
        files: |
          paisa-*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
